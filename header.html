<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Header - Baker Tilly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/header2.css">
</head>
<body class="bg-white">

<header class="bg-bt-dark w-full sticky top-0 z-[1000] px-6 lg:px-9 border-b border-white/5">
    <div class="max-w-[1800px] mx-auto flex justify-between items-center min-h-[90px]">
        
        <div class="flex items-center py-3">
            <a href="index.html" class="flex items-center transition hover:opacity-80">
                  <img src="img/White.png" alt="Logo Baker Tilly" class="h-[54px] w-auto">
            </a>
        </div>

        <div class="flex items-center">
            
            <div id="menu-container" class="hidden xl:flex items-center mr-6 gap-5">
                <nav class="flex items-center">
                    <div class="nav-group relative h-full">
                        <div class="nav-item">Nosotros <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" opacity="100"><path d="M1 1L5 5L9 1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                        <div class="dropdown-menu">
                            <a href="#" class="dropdown-item">Liderazgo</a>
                            <a href="#" class="dropdown-item">Equipo</a>
                            <a href="#" class="dropdown-item">Calidad</a>
                            <a href="#" class="dropdown-item">Oficinas</a>
                            <a href="#" class="dropdown-item">Baker Tilly International</a>
                        </div>
                    </div>

                    <div class="nav-group relative h-full">
                        <div class="nav-item">Prácticas <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" opacity="100"><path d="M1 1L5 5L9 1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                        <div class="dropdown-menu">
                            <a href="#" class="dropdown-item">Auditoría</a>
                            <a href="#" class="dropdown-item">Consultoría</a>
                            <a href="#" class="dropdown-item">Legal</a>
                            <a href="#" class="dropdown-item">Impuestos</a>
                            <a href="#" class="dropdown-item">Advisory</a>
                        </div>
                    </div>

                    <div class="nav-item">Eventos</div>
                    <div class="nav-item">Novedades</div>
                    <div class="nav-item">En los Medios</div>

                    <div class="nav-group relative h-full">
                        <div class="nav-item">Carrera <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" opacity="100"><path d="M1 1L5 5L9 1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                        <div class="dropdown-menu">
                            <a href="#" class="dropdown-item">Vacantes</a>
                            <a href="#" class="dropdown-item">Nuestra Cultura</a>
                            <a href="#" class="dropdown-item">Beneficios</a>
                        </div>
                    </div>
                </nav>

                <button class="btn-contact mr-2">Contáctanos</button>
            </div>

            <div class="flex items-center space-x-2">
                
                <button class="icon-search text-white opacity-90 hover:text-bt-lime transition">
                    <svg width="50" height="42" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="16.0002" cy="14.6004" r="8.14336" stroke="white" stroke-width="2"></circle>
                        <line x1="22.319" y1="21.293" x2="25.0449" y2="24.0188" stroke="white" stroke-width="2" stroke-linecap="round"></line>
                    </svg>
                </button>
                
                <button class="icon-globe text-white opacity-90 hover:text-bt-lime transition">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M2 12H22" stroke="white" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M12 2C14.5013 4.73835 15.9228 8.29203 16 12C15.9228 15.708 14.5013 19.2616 12 22C9.49872 19.2616 8.07725 15.708 8 12C8.07725 8.29203 9.49872 4.73835 12 2Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>

                <button id="btn-mobile" class="xl:hidden text-white pl-2 focus:outline-none">
                    <svg id="icon-bars" width="30" height="30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                    <svg id="icon-close" width="30" height="30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>

            </div>
        </div>
    </div>
</header>

<script>
    const btnMobile = document.getElementById('btn-mobile');
    const menuContainer = document.getElementById('menu-container');

    // Controla la apertura del menú y la animación de la X
    btnMobile.addEventListener('click', () => {
        menuContainer.classList.toggle('hidden');
        menuContainer.classList.toggle('mobile-menu-active');
        btnMobile.classList.toggle('is-active'); 
    });

    // Controla los submenús en celular
    const navGroups = document.querySelectorAll('.nav-group');
    navGroups.forEach(group => {
        group.addEventListener('click', (e) => {
            if (window.innerWidth < 1280) {
                const dropdown = group.querySelector('.dropdown-menu');
                if(dropdown) {
                    navGroups.forEach(g => { 
                        if(g !== group) g.classList.remove('open-mobile'); 
                    });
                    group.classList.toggle('open-mobile');
                }
            }
        });
    });
</script>

</body>
</html>
